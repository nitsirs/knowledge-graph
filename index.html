<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaBUS Knowledge Base</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .correlation-bar { transition: width 0.4s ease; }
    .result-card { transition: all 0.15s ease; }
    .result-card:hover { transform: translateX(3px); }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center gap-4">
      <div>
        <h1 class="text-lg font-bold text-slate-800">MetaBUS Knowledge Base</h1>
        <p class="text-xs text-slate-400">4,870 constructs · 222,123 meta-analytic correlations</p>
      </div>
      <div class="flex-1 max-w-xl ml-auto">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search constructs… e.g. burnout, psychological safety, leadership"
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-sm transition" />
          <div id="searchSpinner" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
            <div class="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-4 py-6 flex gap-6">

    <!-- Left: domains + results -->
    <div class="w-80 flex-shrink-0 space-y-4">

      <!-- Domains -->
      <div id="domainsSection">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Browse by domain</p>
        <div id="domainsList" class="space-y-1">
          <div class="h-8 bg-slate-200 rounded-lg animate-pulse"></div>
          <div class="h-8 bg-slate-200 rounded-lg animate-pulse"></div>
          <div class="h-8 bg-slate-200 rounded-lg animate-pulse"></div>
        </div>
      </div>

      <!-- Results -->
      <div id="resultsSection" class="hidden">
        <div class="flex items-center justify-between mb-2">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Results</p>
          <span id="matchBadge" class="text-xs px-2 py-0.5 rounded-full font-medium"></span>
        </div>
        <div id="resultsList" class="space-y-1"></div>
      </div>

    </div>

    <!-- Right: detail panel -->
    <div class="flex-1 min-w-0">
      <!-- Empty state -->
      <div id="emptyState" class="flex flex-col items-center justify-center h-64 text-center">
        <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-4">
          <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <p class="text-slate-500 font-medium">Search a construct or pick a domain</p>
        <p class="text-slate-400 text-sm mt-1">Supports keywords, phrases, and natural language</p>
      </div>

      <!-- Detail card -->
      <div id="detailCard" class="hidden fade-in bg-white rounded-2xl border border-slate-200 overflow-hidden">

        <!-- Construct header -->
        <div class="p-6 border-b border-slate-100">
          <div class="flex items-start justify-between gap-4">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span id="detailDomain" class="text-xs font-semibold px-2 py-0.5 bg-blue-50 text-blue-600 rounded-full"></span>
                <span id="detailEvidence" class="text-xs font-semibold px-2 py-0.5 rounded-full"></span>
              </div>
              <h2 id="detailName" class="text-xl font-bold text-slate-800"></h2>
              <p id="detailPath" class="text-xs text-slate-400 mt-1 leading-relaxed"></p>
            </div>
            <div class="text-right flex-shrink-0">
              <p class="text-2xl font-bold text-slate-700" id="detailKTotal"></p>
              <p class="text-xs text-slate-400">total studies</p>
            </div>
          </div>

          <!-- Stats row -->
          <div class="grid grid-cols-3 gap-3 mt-5">
            <div class="bg-slate-50 rounded-xl p-3 text-center">
              <p class="text-lg font-bold text-slate-700" id="statNIncoming"></p>
              <p class="text-xs text-slate-400 mt-0.5">correlated with</p>
            </div>
            <div class="bg-slate-50 rounded-xl p-3 text-center">
              <p class="text-lg font-bold text-slate-700" id="statAvgR"></p>
              <p class="text-xs text-slate-400 mt-0.5">avg |r|</p>
            </div>
            <div class="bg-slate-50 rounded-xl p-3 text-center">
              <p class="text-lg font-bold text-slate-700" id="statMaxR"></p>
              <p class="text-xs text-slate-400 mt-0.5">max |r|</p>
            </div>
          </div>
        </div>

        <!-- Top correlates -->
        <div class="p-6">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Top correlated constructs</p>
          <div id="correlatesList" class="space-y-3"></div>
          <div id="correlatesLoading" class="space-y-3">
            <div class="h-12 bg-slate-100 rounded-xl animate-pulse"></div>
            <div class="h-12 bg-slate-100 rounded-xl animate-pulse"></div>
            <div class="h-12 bg-slate-100 rounded-xl animate-pulse"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
const API = 'https://grgoshdgiuqihkkqlfhh.supabase.co/functions/v1/kb'

// ── state ─────────────────────────────────────────────────────────────────────
let searchTimer = null
let activeId    = null

// ── init ──────────────────────────────────────────────────────────────────────
async function init() {
  const res  = await fetch(`${API}/domains`)
  const data = await res.json()
  renderDomains(data.domains || [])
}

// ── domains ───────────────────────────────────────────────────────────────────
function renderDomains(domains) {
  const el = document.getElementById('domainsList')
  el.innerHTML = domains.map(d => `
    <button onclick="loadDomainSearch(${d.id}, '${esc(d.name)}')"
      class="w-full text-left px-3 py-2 rounded-lg text-sm text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition flex items-center justify-between group">
      <span>${d.name}</span>
      <svg class="w-3.5 h-3.5 text-slate-300 group-hover:text-slate-400 opacity-0 group-hover:opacity-100 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  `).join('')
}

async function loadDomainSearch(id, name) {
  document.getElementById('searchInput').value = name
  await doSearch(name)
}

// ── search ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer)
  const q = e.target.value.trim()
  if (!q) { showEmpty(); return }
  searchTimer = setTimeout(() => doSearch(q), 350)
})

async function doSearch(q) {
  document.getElementById('searchSpinner').classList.remove('hidden')
  try {
    const res  = await fetch(`${API}/search`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ keyword: q, limit: 20 }),
    })
    const data = await res.json()
    renderResults(data.results || [], data.match_type)
  } finally {
    document.getElementById('searchSpinner').classList.add('hidden')
  }
}

function renderResults(results, matchType) {
  const section = document.getElementById('resultsSection')
  const list    = document.getElementById('resultsList')
  const badge   = document.getElementById('matchBadge')

  section.classList.remove('hidden')
  document.getElementById('domainsSection').classList.add('hidden')

  badge.textContent   = matchType === 'semantic' ? 'Semantic' : 'Keyword'
  badge.className     = `text-xs px-2 py-0.5 rounded-full font-medium ${
    matchType === 'semantic' ? 'bg-purple-50 text-purple-600' : 'bg-green-50 text-green-600'
  }`

  list.innerHTML = results.map(r => `
    <button onclick="loadDetail(${r.id})"
      class="result-card w-full text-left px-3 py-2.5 rounded-xl border border-transparent hover:border-blue-200 hover:bg-blue-50 transition group ${r.id === activeId ? 'border-blue-200 bg-blue-50' : ''}">
      <p class="text-sm font-medium text-slate-700 group-hover:text-blue-700 truncate">${r.name}</p>
      <p class="text-xs text-slate-400 truncate mt-0.5">${shortPath(r.path)}</p>
    </button>
  `).join('')

  if (results.length > 0 && activeId !== results[0].id) loadDetail(results[0].id)
}

// ── detail ────────────────────────────────────────────────────────────────────
async function loadDetail(id) {
  activeId = id
  highlightActive(id)

  document.getElementById('emptyState').classList.add('hidden')
  const card = document.getElementById('detailCard')
  card.classList.remove('hidden')
  card.classList.add('fade-in')

  // show correlates loading
  document.getElementById('correlatesList').innerHTML = ''
  document.getElementById('correlatesLoading').classList.remove('hidden')

  const [ctx] = await Promise.all([
    fetch(`${API}/context?id=${id}`).then(r => r.json()),
  ])

  // fill header
  document.getElementById('detailName').textContent   = ctx.construct?.name ?? ''
  document.getElementById('detailDomain').textContent = ctx.construct?.domain ?? ''
  document.getElementById('detailPath').textContent   = ctx.construct?.path ?? ''
  document.getElementById('detailKTotal').textContent = (ctx.stats?.total_k_effects ?? 0).toLocaleString()
  document.getElementById('statNIncoming').textContent = (ctx.stats?.n_incoming ?? 0).toLocaleString()
  document.getElementById('statAvgR').textContent     = (ctx.stats?.avg_abs_r_in ?? 0).toFixed(3)
  document.getElementById('statMaxR').textContent     = (ctx.stats?.max_abs_r_in ?? 0).toFixed(3)

  const ev    = ctx.evidence_strength ?? 'limited'
  const evEl  = document.getElementById('detailEvidence')
  evEl.textContent = ev.charAt(0).toUpperCase() + ev.slice(1) + ' evidence'
  evEl.className   = `text-xs font-semibold px-2 py-0.5 rounded-full ${
    ev === 'strong'   ? 'bg-emerald-50 text-emerald-600' :
    ev === 'moderate' ? 'bg-amber-50 text-amber-600' :
                        'bg-slate-100 text-slate-500'
  }`

  // fetch full correlates list
  const corrRes  = await fetch(`${API}/correlates?id=${id}&limit=15&min_k=3`)
  const corrData = await corrRes.json()
  const corrs    = corrData.correlates || []

  document.getElementById('correlatesLoading').classList.add('hidden')
  document.getElementById('correlatesList').innerHTML = corrs.length === 0
    ? '<p class="text-sm text-slate-400 text-center py-4">No correlates found with ≥3 studies</p>'
    : corrs.map(c => correlateRow(c)).join('')
}

function correlateRow(c) {
  const pct       = Math.round(c.abs_r * 100)
  const isPos     = c.direction === 'positive'
  const barColor  = isPos ? 'bg-blue-400' : 'bg-rose-400'
  const dirIcon   = isPos
    ? '<svg class="w-3 h-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>'
    : '<svg class="w-3 h-3 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>'

  return `
    <button onclick="loadDetail(${c.id})"
      class="w-full text-left p-3 rounded-xl hover:bg-slate-50 transition group">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-sm font-medium text-slate-700 group-hover:text-blue-700 truncate pr-2">${c.name}</span>
        <div class="flex items-center gap-1.5 flex-shrink-0">
          ${dirIcon}
          <span class="text-sm font-bold text-slate-600">${c.abs_r.toFixed(3)}</span>
          <span class="text-xs text-slate-400">k=${c.k_effects}</span>
        </div>
      </div>
      <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full ${barColor} rounded-full correlation-bar" style="width: ${pct}%"></div>
      </div>
    </button>
  `
}

function highlightActive(id) {
  document.querySelectorAll('#resultsList button').forEach(btn => {
    const isActive = btn.getAttribute('onclick')?.includes(`loadDetail(${id})`)
    btn.classList.toggle('border-blue-200', isActive)
    btn.classList.toggle('bg-blue-50',      isActive)
  })
}

// ── helpers ───────────────────────────────────────────────────────────────────
function showEmpty() {
  document.getElementById('resultsSection').classList.add('hidden')
  document.getElementById('domainsSection').classList.remove('hidden')
  document.getElementById('emptyState').classList.remove('hidden')
  document.getElementById('detailCard').classList.add('hidden')
  activeId = null
}

function shortPath(path) {
  if (!path) return ''
  const parts = path.split(' > ')
  return parts.length <= 3 ? path : parts[0] + ' › … › ' + parts[parts.length - 1]
}

function esc(s) { return s.replace(/'/g, "\\'") }

// ── start ─────────────────────────────────────────────────────────────────────
init()
</script>
</body>
</html>
